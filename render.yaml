services:
  # 1. Backend FastAPI Service
  - type: web
    name: talentlens-backend
    runtime: docker
    plan: free # Free tier (using lightweight MiniLM model)
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: GROQ_API_KEY
        sync: false # Render will prompt you to input this securely during setup
      - key: DATABASE_URL
        value: sqlite:///app/backend/talentlens.db
      - key: PYTHONPATH
        value: /app

  # 2. Frontend React Static Service
  - type: web
    name: talentlens-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: talentlens-backend
          type: web
          property: host
